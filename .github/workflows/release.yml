name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  PUBLISH_PACKAGES: rnk-style-core rnk-style rnk-icons rnk

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify package versions from Cargo metadata
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys

          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          publish_packages = os.environ["PUBLISH_PACKAGES"].split()
          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--format-version", "1", "--no-deps", "--locked"],
                  text=True,
              )
          )
          packages = {package["name"]: package for package in metadata["packages"]}

          missing = [name for name in publish_packages if name not in packages]
          if missing:
              print(f"Publish package(s) missing from Cargo metadata: {missing}", file=sys.stderr)
              sys.exit(1)

          root_version = packages["rnk"]["version"]
          if root_version != tag_version:
              print(
                  f"Version mismatch: Cargo metadata has rnk {root_version}, "
                  f"but tag is v{tag_version}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("Publishable package versions:")
          for name in publish_packages:
              package = packages[name]
              print(f"- {name} {package['version']}")
              if package.get("publish") == []:
                  print(f"{name} is marked publish = false", file=sys.stderr)
                  sys.exit(1)
          PY

      - name: Check package contents and README links
        run: |
          set -euo pipefail
          for package in $PUBLISH_PACKAGES; do
            package_list="$(mktemp)"
            cargo package --list -p "$package" --locked > "$package_list"
            if grep -E '^(AGENTS\.md|CLAUDE\.md|docs/|\.github/|\.claude/)' "$package_list"; then
              echo "Unexpected agent-facing, docs, or workflow files in $package package" >&2
              exit 1
            fi
          done
          if grep -nE '\]\((docs/|examples/)' README.md; then
            echo "README uses package-relative docs/examples links that may break on crates.io" >&2
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked --verbose

      - name: Plan crates.io publishing
        id: publish-plan
        run: |
          set -euo pipefail
          unpublished=()

          for package in $PUBLISH_PACKAGES; do
            version="$(python3 .github/scripts/crates_io_release.py package-version "$package")"
            if python3 .github/scripts/crates_io_release.py version-status "$package" "$version"; then
              echo "::notice::Skipping $package $version because it is already published"
              continue
            fi

            status=$?
            if [ "$status" -eq 10 ]; then
              echo "::notice::$package $version needs publishing"
              unpublished+=("$package")
              continue
            fi

            exit "$status"
          done

          echo "packages=${unpublished[*]}" >> "$GITHUB_OUTPUT"
          echo "count=${#unpublished[@]}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io
        if: steps.publish-plan.outputs.count != '0'
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.publish-plan.outputs.count != '0'
        run: |
          set -euo pipefail

          crate_version_published() {
            local package="$1"
            local version="$2"
            if python3 .github/scripts/crates_io_release.py version-status "$package" "$version"; then
              return 0
            fi

            status=$?
            if [ "$status" -eq 10 ]; then
              return 1
            fi

            exit "$status"
          }

          wait_for_crate_version() {
            local package="$1"
            local version="$2"
            local attempts=30

            for attempt in $(seq 1 "$attempts"); do
              if crate_version_published "$package" "$version"; then
                echo "::notice::$package $version is visible on crates.io"
                return 0
              fi

              echo "Waiting for $package $version to be visible on crates.io ($attempt/$attempts)"
              sleep 10
            done

            echo "$package $version was not visible on crates.io after $attempts attempts" >&2
            return 1
          }

          for package in ${{ steps.publish-plan.outputs.packages }}; do
            version="$(python3 .github/scripts/crates_io_release.py package-version "$package")"
            if crate_version_published "$package" "$version"; then
              echo "::notice::Skipping $package $version because it is already published"
              continue
            fi

            cargo publish --dry-run --locked -p "$package"
            cargo publish --locked -p "$package"
            wait_for_crate_version "$package" "$version"
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
