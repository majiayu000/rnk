name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  PUBLISH_PACKAGES: rnk-style-core rnk-style rnk-icons rnk

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify package versions from Cargo metadata
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys

          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          publish_packages = os.environ["PUBLISH_PACKAGES"].split()
          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--format-version", "1", "--no-deps", "--locked"],
                  text=True,
              )
          )
          packages = {package["name"]: package for package in metadata["packages"]}

          missing = [name for name in publish_packages if name not in packages]
          if missing:
              print(f"Publish package(s) missing from Cargo metadata: {missing}", file=sys.stderr)
              sys.exit(1)

          root_version = packages["rnk"]["version"]
          if root_version != tag_version:
              print(
                  f"Version mismatch: Cargo metadata has rnk {root_version}, "
                  f"but tag is v{tag_version}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("Publishable package versions:")
          for name in publish_packages:
              package = packages[name]
              print(f"- {name} {package['version']}")
              if package.get("publish") == []:
                  print(f"{name} is marked publish = false", file=sys.stderr)
                  sys.exit(1)
          PY

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked --verbose

      - name: Publish to crates.io
        run: |
          package_version() {
            local package="$1"
            PACKAGE="$package" python3 <<'PY'
          import json
          import os
          import subprocess

          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--format-version", "1", "--no-deps", "--locked"],
                  text=True,
              )
          )
          package_name = os.environ["PACKAGE"]
          packages = {package["name"]: package["version"] for package in metadata["packages"]}
          print(packages[package_name])
          PY
          }

          crate_version_published() {
            local package="$1"
            local version="$2"
            PACKAGE="$package" VERSION="$version" python3 <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          package = os.environ["PACKAGE"]
          version = os.environ["VERSION"]
          request = urllib.request.Request(
              f"https://crates.io/api/v1/crates/{package}/{version}",
              headers={"User-Agent": "rnk-release-workflow"},
          )

          try:
              with urllib.request.urlopen(request, timeout=30):
                  pass
          except urllib.error.HTTPError as error:
              if error.code == 404:
                  sys.exit(1)
              raise
          except urllib.error.URLError as error:
              print(
                  f"Could not check crates.io for {package} {version}: {error}",
                  file=sys.stderr,
              )
              sys.exit(2)
          PY
          }

          for package in $PUBLISH_PACKAGES; do
            version="$(package_version "$package")"
            if crate_version_published "$package" "$version"; then
              echo "::notice::Skipping $package $version because it is already published"
              continue
            fi

            cargo publish --dry-run --locked -p "$package"
            cargo publish --locked -p "$package"
            sleep 20
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
